{{define "title"}}Setup — local-scava{{end}}
{{define "content"}}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg-0);">
  <div style="width:100%; max-width:400px; padding:32px;">
    <div style="text-align:center; margin-bottom:32px;">
      <span style="font-family:var(--mono); font-size:16px; color:var(--fg-0); letter-spacing:0.02em;">local-scava</span>
    </div>
    <div class="card" style="padding:24px;">
      <h2 style="font-size:18px; color:var(--fg-0); margin:0 0 8px; font-weight:600;">Welcome</h2>
      <p style="color:var(--fg-2); font-size:13px; margin:0 0 20px;">Set your admin password to get started.</p>
      {{if .Error}}
      <div class="alert-bar critical" style="margin-bottom:16px;">
        <span class="alert-label">Error</span>
        <span class="alert-message">{{.Error}}</span>
      </div>
      {{end}}
      <form method="POST" action="/setup" class="stack">
        <div>
          <label style="font-size:12px; color:var(--fg-2); display:block; margin-bottom:4px;">Display name (optional)</label>
          <input type="text" name="display_name" placeholder="admin" style="width:100%;">
        </div>
        <div>
          <label style="font-size:12px; color:var(--fg-2); display:block; margin-bottom:4px;">Password</label>
          <input type="password" name="password" required minlength="8" placeholder="At least 8 characters" style="width:100%;">
        </div>
        <div>
          <label style="font-size:12px; color:var(--fg-2); display:block; margin-bottom:4px;">Confirm password</label>
          <input type="password" name="confirm" required minlength="8" placeholder="Confirm" style="width:100%;">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">Create account</button>
      </form>
    </div>
  </div>
</div>
{{end}}
