{{define "content"}}
<div class="grid grid-2">
  <div class="card" id="log">
    <div class="card-head">Log today</div>
    <form method="post" action="/logs" class="stack">
      <input type="date" name="log_date" value="{{.Today}}">
      <input type="text" name="worked_on" placeholder="what I worked on (required)" required>
      <input type="text" name="what_happened" placeholder="what actually happened (detours/blockers)">
      <input type="text" name="insight" placeholder="the specific fix / insight / decision">
      <input type="text" name="next_up" placeholder="what's next">
      <input type="text" name="blocker" placeholder="current blocker (optional)">
      <div class="radio-row">
        <span class="muted">blocker decision:</span>
        <label><input type="radio" name="blocker_decision" value=""> none</label>
        <label><input type="radio" name="blocker_decision" value="solve"> solve</label>
        <label><input type="radio" name="blocker_decision" value="workaround"> workaround</label>
        <label><input type="radio" name="blocker_decision" value="cut"> cut</label>
      </div>
      <button class="btn" type="submit">save log</button>
    </form>
  </div>

  <div class="card" id="post">
    <div class="card-head">New post</div>
    <form method="post" action="/posts" class="stack">
      <div class="radio-row">
        <span class="muted">type:</span>
        <label><input type="radio" name="post_type" value="daily" checked> daily</label>
        <label><input type="radio" name="post_type" value="recap"> recap</label>
      </div>
      <input type="date" name="post_date" value="{{.Today}}">
      <input type="text" name="title" placeholder="title (optional)">
      <select name="sprint_id">
        <option value="0">— current sprint —</option>
        {{range .Sprints}}<option value="{{.ID}}">{{.MonthLabel}} · {{.SkillName}}</option>{{end}}
      </select>
      <label><input type="checkbox" name="is_declaration" value="1"> this is the declaration post</label>
      <button class="btn" type="submit">create post</button>
    </form>
  </div>
</div>

<div class="card" id="sprint">
  <div class="card-head">New sprint</div>
  <form method="post" action="/sprints" class="stack">
    <input type="text" name="month_label" placeholder="month label (e.g. {{.Today}} → 2026-07)">
    <input type="text" name="skill_name" placeholder="skill of the month (required)" required>
    <input type="text" name="skill_rationale" placeholder="why this skill / what it unlocks">
    <input type="text" name="microapp_one_liner" placeholder="the microapp, in one sentence (required)" required>
    <input type="text" name="core_feature" placeholder="core feature that must work (required)" required>
    <input type="text" name="out_of_scope" placeholder="explicitly out of scope">
    <select name="deploy_platform">
      <option value="">— deploy platform —</option>
      <option>Vercel</option><option>Netlify</option><option>Railway</option>
      <option>Fly.io</option><option>Render</option><option>Other</option>
    </select>
    <div class="radio-row">
      <span class="muted">status:</span>
      <label><input type="radio" name="status" value="active" checked> active</label>
      <label><input type="radio" name="status" value="planned"> planned</label>
    </div>
    <button class="btn" type="submit">start sprint</button>
  </form>
</div>

<div class="card" id="adr">
  <div class="card-head">New ADR</div>
  <form method="post" action="/adrs" class="stack">
    <input type="number" name="number" placeholder="number (blank = auto)">
    <input type="text" name="title" placeholder="short title of the decision (required)" required>
    <select name="status">
      <option value="proposed">proposed</option>
      <option value="decided">decided</option>
      <option value="superseded">superseded</option>
    </select>
    <input type="date" name="decided_on">
    <textarea name="problem" rows="2" placeholder="problem — what needed deciding"></textarea>
    <textarea name="options" rows="2" placeholder="options considered + tradeoffs"></textarea>
    <textarea name="decision" rows="2" placeholder="the decision"></textarea>
    <textarea name="why" rows="2" placeholder="why this option won"></textarea>
    <textarea name="consequences" rows="2" placeholder="consequences"></textarea>
    <select name="sprint_id">
      <option value="0">— no sprint —</option>
      {{range .Sprints}}<option value="{{.ID}}">{{.MonthLabel}} · {{.SkillName}}</option>{{end}}
    </select>
    <button class="btn" type="submit">create ADR</button>
  </form>
</div>
{{end}}
