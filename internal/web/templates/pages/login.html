{{define "title"}}Login — local-scava{{end}}
{{define "content"}}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg-0);">
  <div style="width:100%; max-width:400px; padding:32px;">
    <div style="text-align:center; margin-bottom:32px;">
      <span style="font-family:var(--mono); font-size:16px; color:var(--fg-0); letter-spacing:0.02em;">local-scava</span>
    </div>
    <div style="padding:24px 0;">
      <h2 style="font-size:18px; color:var(--fg-0); margin:0 0 8px; font-weight:600;">Sign in</h2>
      <p style="color:var(--fg-2); font-size:13px; margin:0 0 20px;">Access your career dashboard.</p>
      {{if .Error}}
      <div class="alert alert-critical" style="margin-bottom:16px;">{{.Error}}</div>
      {{end}}
      <form method="POST" action="/login" class="stack">
        <input type="hidden" name="next" value="{{.Next}}">
        <div>
          <label style="font-size:12px; color:var(--fg-2); display:block; margin-bottom:4px;">Username</label>
          <input type="text" name="username" value="admin" style="width:100%; border:none; border-bottom:1px solid var(--line); border-radius:0; background:transparent; padding:8px 0;">
        </div>
        <div>
          <label style="font-size:12px; color:var(--fg-2); display:block; margin-bottom:4px;">Password</label>
          <input type="password" name="password" required placeholder="••••••••" style="width:100%; border:none; border-bottom:1px solid var(--line); border-radius:0; background:transparent; padding:8px 0;">
        </div>
        <div class="radio-row">
          <label><input type="checkbox" name="remember"> Remember me</label>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:16px; padding:12px;">Sign in</button>
      </form>
    </div>
  </div>
</div>
{{end}}
