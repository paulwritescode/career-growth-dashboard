{{define "content"}}
<div class="card" style="max-width:520px;margin:4rem auto;text-align:center;padding:2.5rem 2rem;">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:1rem"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  <h2 style="margin-bottom:.5rem">{{.BlockName}} is disabled</h2>
  <p class="muted" style="margin-bottom:1.5rem">This block hasn't been enabled for your account. Enable it in Settings → Blocks to get access.</p>
  <div style="display:flex;gap:.75rem;justify-content:center">
    <a class="btn" href="/settings#blocks">Enable in Settings</a>
    <a class="btn-ghost" href="/">Back to overview</a>
  </div>
</div>
{{end}}
