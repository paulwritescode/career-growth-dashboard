{{define "content"}}
<div class="toolbar"><a class="btn" href="/new#adr">+ new ADR</a></div>
<div class="card">
  <table class="table">
    <thead><tr><th>#</th><th>title</th><th>status</th><th>decided</th></tr></thead>
    <tbody>
    {{range .ADRs}}
      <tr>
        <td class="mono">ADR-{{.Number}}</td>
        <td>{{.Title}}</td>
        <td><span class="tag tag-{{.Status}}">{{.Status}}</span></td>
        <td class="mono muted">{{if .DecidedOn}}{{derefStr .DecidedOn}}{{end}}</td>
      </tr>
    {{else}}
      <tr><td colspan="4" class="muted">No ADRs yet.</td></tr>
    {{end}}
    </tbody>
  </table>
</div>
{{end}}
