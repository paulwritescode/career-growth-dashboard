{{define "content"}}
<div class="toolbar"><a class="btn" href="/new#adr">+ new ADR</a></div>
<div class="card">
  <table class="table">
    <thead><tr><th>#</th><th>title</th><th>status</th><th>decided</th><th></th></tr></thead>
    <tbody>
    {{range .ADRs}}
      <tr>
        <td class="mono">ADR-{{.Number}}</td>
        <td><a href="/adrs/{{.ID}}">{{.Title}}</a></td>
        <td><span class="tag tag-status tag-status-{{.Status}}">{{.Status}}</span></td>
        <td class="mono muted">{{if .DecidedOn}}{{derefStr .DecidedOn}}{{end}}</td>
        <td>
          <form method="post" action="/adrs/{{.ID}}/delete" style="display:inline" onsubmit="return confirm('Delete ADR-{{.Number}}: {{.Title}}?')">
            <button class="btn-ghost btn-sm" type="submit" title="Delete">✕</button>
          </form>
        </td>
      </tr>
    {{else}}
      <tr><td colspan="5" class="muted">No ADRs yet.</td></tr>
    {{end}}
    </tbody>
  </table>
</div>
{{end}}
