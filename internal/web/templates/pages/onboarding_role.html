{{define "title"}}Onboarding — Role{{end}}
{{define "content"}}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg-0);">
  <div style="width:100%; max-width:600px; padding:32px;">
    <!-- Step indicator -->
    <div style="display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:32px;">
      <span style="color:var(--fg-0); font-size:13px; font-weight:600;">1</span>
      <span style="width:40px; height:1px; background:var(--line);"></span>
      <span style="color:var(--fg-2); font-size:13px;">2</span>
      <span style="width:40px; height:1px; background:var(--line);"></span>
      <span style="color:var(--fg-2); font-size:13px;">3</span>
    </div>

    <div style="text-align:center; margin-bottom:24px;">
      <h2 style="font-size:18px; color:var(--fg-0); margin:0 0 8px; font-weight:600;">Which best describes you?</h2>
      <p style="color:var(--fg-2); font-size:13px; margin:0;">This helps us suggest the right modules for your dashboard.</p>
    </div>

    <form method="POST" action="/onboarding/role">
      <div style="display:grid; grid-template-columns:repeat(2, 1fr); gap:12px; margin-bottom:24px;">
        {{$current := .CurrentRole}}
        {{range $role := (roles)}}
        <label class="card" style="cursor:pointer; padding:16px; display:flex; align-items:center; gap:12px;{{if eq $current $role.Value}} border-color:var(--blue);{{end}}">
          <input type="radio" name="role" value="{{$role.Value}}" {{if eq $current $role.Value}}checked{{end}} style="accent-color:var(--blue);">
          <span style="font-size:13px; color:var(--fg-0);">{{$role.Label}}</span>
        </label>
        {{end}}
      </div>

      <div id="role-other-field" style="margin-bottom:24px; display:none;">
        <label style="font-size:12px; color:var(--fg-2); display:block; margin-bottom:4px;">Describe your role</label>
        <input type="text" name="role_other" value="{{.RoleOther}}" placeholder="e.g. Technical writer" style="width:100%;">
      </div>

      <div style="display:flex; justify-content:flex-end;">
        <button type="submit" class="btn btn-primary">Continue</button>
      </div>
    </form>
  </div>
</div>
{{end}}
